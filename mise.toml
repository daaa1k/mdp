[tools]
go = "1.26.0"
golangci-lint = "v2.11.3"
pinact = "3.9.0"
prek = "0.3.3"

[tasks.test]
run = "go test ./... -coverprofile=coverage.out -covermode=count -count=1"
description = "Run tests"

[tasks.lint]
run = ["golangci-lint run ./...", "go vet ./..."]
description = "Run lint"

[tasks.fmt]
run = "gofmt -w ."
description = "Run formatting"

[tasks.fmt-check]
run = """
#!/usr/bin/env bash
output=$(gofmt -l .)
if [ -n "$output" ]; then
  printf '%s\n' "$output"
  echo 'Run: mise run fmt'
  exit 1
fi
"""
description = "Run formatting check"

[tasks.build]
run = "go build -o mdp ."
description = "Build binary"

[tasks.e2e-macos-clipboard-webp]
run = "bash scripts/e2e-macos-clipboard-webp.sh"
description = "E2E: clipboard snapshot restore → mdp local → WebP (macOS only; skips elsewhere)"

[tasks.e2e-macos-clipboard-filedrop]
run = "bash scripts/e2e-macos-clipboard-filedrop.sh"
description = "E2E: file-drop PNG/WebP → mdp local → byte-identical output (macOS only; skips elsewhere)"

[tasks.ci]
depends = ["fmt-check", "lint", "test"]
description = "Run all CI checks"

[tasks.credits]
run = """
go install github.com/Songmu/gocredits/cmd/gocredits@latest
go mod download
gocredits -skip-missing -w .
"""

[tasks.prerelease-for-tagpr]
depends = ["credits"]
run = """
git add CHANGELOG.md CREDITS go.mod go.sum
"""
