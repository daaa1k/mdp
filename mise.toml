[tools]
go = "1.26.1"
golangci-lint = "2.11.4"
prek = "0.3.3"

[tasks.test]
run = "go test ./... -coverprofile=coverage.out -covermode=count -count=1"
description = "Run tests"

[tasks.lint]
run = ["golangci-lint run ./...", "go vet ./..."]
description = "Run lint"

[tasks.fmt]
run = "gofmt -w ."
description = "Run formatting"

[tasks.fmt-check]
run = """
#!/usr/bin/env bash
output=$(gofmt -l .)
if [ -n "$output" ]; then
  printf '%s\n' "$output"
  echo 'Run: mise run fmt'
  exit 1
fi
"""
description = "Run formatting check"

[tasks.renovate-check]
run = "npx --yes --package renovate -- renovate-config-validator renovate.json"
description = "Validate renovate.json"

[tasks.pinact-update]
run = "pinact run -u -m 5"
description = "Update github actions' pinned dependencies (with minReleaseAge 5 days)"

[tasks.build]
run = "go build -o mdp ."
description = "Build binary"

[tasks.e2e-macos-clipboard-webp]
run = "bash scripts/e2e-macos-clipboard-webp.sh"
description = "E2E: clipboard snapshot restore → mdp local → WebP (macOS only; skips elsewhere)"

[tasks.e2e-macos-clipboard-filedrop]
run = "bash scripts/e2e-macos-clipboard-filedrop.sh"
description = "E2E: file-drop PNG/WebP → mdp local → byte-identical output (macOS only; skips elsewhere)"

[tasks.e2e-wsl-clipboard-webp]
run = "bash scripts/e2e-wsl-clipboard-webp.sh"
description = "E2E: clipboard PNG → mdp local → WebP (WSL2 only; skips elsewhere)"

[tasks.e2e-wsl-clipboard-filedrop]
run = "bash scripts/e2e-wsl-clipboard-filedrop.sh"
description = "E2E: file-drop PNG/WebP → mdp local → byte-identical output (WSL2 only; skips elsewhere)"

[tasks.e2e-ci-windows]
run = "powershell.exe -Sta -NoProfile -ExecutionPolicy Bypass -File scripts/ci-e2e-windows.ps1"
description = "E2E (CI parity): native Windows PowerShell clipboard; same fixtures as macOS/WSL2"

[tasks.e2e-ci-linux-wayland]
run = "bash scripts/ci-e2e-linux-wayland.sh"
description = "E2E (CI parity): Wayland wl-clipboard (+ Xvfb+nested Weston if no session); same fixtures as macOS/WSL2/Windows"

[tasks.ci]
depends = ["fmt-check", "lint", "test"]
description = "Run all CI checks"

[tasks.credits]
run = """
go install github.com/Songmu/gocredits/cmd/gocredits@latest
go mod download
gocredits -skip-missing -w .
"""
description = "Update CREDITS"

[tasks.prerelease-for-tagpr]
depends = ["credits"]
run = """
git add CHANGELOG.md CREDITS go.mod go.sum
"""
description = "Update CREDITS and add stage the relevant files"

[tasks.github-actions-lint]
run = [
  "actionlint",
  "ghalint run",
  "zizmor .",
]
description = "Run github actions lint"

[tasks.copier-check]
run = "copier check-update"
description = "Check updates for template"

[tasks.copier-update]
run = "copier update"
description = "Apply updates for template"
