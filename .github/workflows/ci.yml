name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

  nix:
    name: Nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      # NOTE: actions/cache for /nix/store cannot work here — Nix is installed
      # first and the daemon owns the store with strict permissions, so gtar
      # always fails with "Permission denied". Rely on Cachix instead.

      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: '-source$'

      - name: Build (populate cache)
        run: nix build

      - name: Flake check
        run: nix flake check
