name: Windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
