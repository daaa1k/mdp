name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release create "${{ github.ref_name }}" \
              --generate-notes \
              --title "${{ github.ref_name }}"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: mdpaste-linux-x86_64
            binary: mdpaste
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: mdpaste-macos-aarch64
            binary: mdpaste
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: mdpaste-windows-x86_64.exe
            binary: mdpaste.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          GOARCH=$(echo "${{ matrix.target }}" | cut -d- -f1 | sed 's/x86_64/amd64/;s/aarch64/arm64/') \
          GOOS=$(echo "${{ matrix.target }}" | grep -q 'linux' && echo linux || echo darwin) \
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "${{ matrix.binary }}" .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "${{ matrix.binary }}" .

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cp "${{ matrix.binary }}" "${{ matrix.artifact }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.artifact }}" --clobber
